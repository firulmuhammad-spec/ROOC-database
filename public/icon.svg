<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark slate gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121212" />
      <stop offset="50%" stop-color="#0F0F0F" />
      <stop offset="100%" stop-color="#1A1A1A" />
    </linearGradient>
    
    <!-- Rich classic gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C294" />
      <stop offset="30%" stop-color="#C19A6B" />
      <stop offset="70%" stop-color="#8A6437" />
      <stop offset="100%" stop-color="#C19A6B" />
    </linearGradient>
    
    <!-- Outer gold glow effect -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="112" />

  <!-- Outer Elegant Golden Ornate Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.4" />
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="12 6" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />

  <!-- Inner solid gold ring -->
  <circle cx="256" cy="256" r="145" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#goldGlow)" />

  <!-- Cross Swords Motif in background of inner circle -->
  <!-- Sword 1: Top-Left to Bottom-Right -->
  <path d="M 160 160 L 352 352" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" opacity="0.7" />
  <path d="M 150 170 L 170 150" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />
  <!-- Sword 2: Top-Right to Bottom-Left -->
  <path d="M 352 160 L 160 352" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" opacity="0.7" />
  <path d="M 342 150 L 362 170" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" opacity="0.7" />

  <!-- Center Shield Emblem with ROOC Lettering -->
  <path d="M 206 190 Q 256 180 306 190 Q 316 260 256 325 Q 196 260 206 190 Z" fill="#0F0F0F" stroke="url(#goldGrad)" stroke-width="8" filter="url(#goldGlow)" />
  <path d="M 216 198 Q 256 190 296 198 Q 304 254 256 310 Q 208 254 216 198 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5" />

  <!-- Large Golden Winged Crown Ornament on top of shield -->
  <path d="M 226 150 L 236 170 L 256 155 L 276 170 L 286 150 L 271 178 L 241 178 Z" fill="url(#goldGrad)" filter="url(#goldGlow)" />
  <circle cx="256" cy="155" r="4" fill="#0F0F0F" />
  <circle cx="226" cy="150" r="3" fill="url(#goldGrad)" />
  <circle cx="286" cy="150" r="3" fill="url(#goldGrad)" />

  <!-- "ROOC" Serif Logo Typography inside the Shield -->
  <text x="256" y="240" font-family="'Times New Roman', Georgia, serif" font-weight="bold" font-size="34" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="1">ROOC</text>
  
  <!-- "CLASSIC" Subtitle inside the Shield -->
  <text x="256" y="270" font-family="'Courier New', monospace" font-size="12" font-weight="900" fill="#F0F0E8" text-anchor="middle" letter-spacing="4" opacity="0.8">CLASSIC</text>

  <!-- Ornate bottom ribbon/banner decoration -->
  <path d="M 156 340 Q 256 380 356 340 L 346 365 Q 256 405 166 365 Z" fill="url(#goldGrad)" filter="url(#goldGlow)" />
  <text x="256" y="367" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#0F0F0F" text-anchor="middle" letter-spacing="2">ARCHIVE</text>
</svg>
